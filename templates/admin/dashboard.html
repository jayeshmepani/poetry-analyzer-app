{% extends "layouts/app.html" %}

{% block title %}User Management - Poetry Analyzer{% endblock %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="page-header">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <h1>User Management</h1>
    </div>

    <!-- Toolbar (injected into table-toolbar via data-toolbar="#toolbar") -->
    <div id="toolbar" class="d-flex items-center gap-2">
        <button type="button" class="btn btn-primary" id="btnCreate">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add User
        </button>
        <button type="button" class="btn btn-danger" id="btnDeleteSelected" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
            Delete Selected
        </button>
    </div>

    <!-- Declarative custom table -->
    <table data-table data-url="/admin/users/data" data-sort="created_at" data-order="desc" data-page-size="10"
        data-page-list="[10,25,50,100]" data-search="true" data-click-to-select="true" data-toolbar="#toolbar"
        id="usersTable">
        <thead>
            <tr>
                <th data-field="state" data-checkbox="true"></th>
                <th data-field="id" data-sortable="true">ID</th>
                <th data-field="name" data-sortable="true">Name</th>
                <th data-field="email" data-sortable="true">Email</th>
                <th data-field="role" data-formatter="roleFormatter">Role</th>
                <th data-field="status" data-formatter="statusFormatter" data-events="statusEvents">Status</th>
                <th data-field="created_at" data-sortable="true">Joined</th>
                <th data-field="actions" data-formatter="actionsFormatter" data-events="actionEvents">Actions</th>
            </tr>
        </thead>
    </table>

</div>

<!-- User Modal (Create / Edit) -->
<dialog class="native-modal" id="userModal">
    <form id="userForm" autocomplete="off">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">Create User</h3>
            <button type="button" class="modal-close-btn" id="btnModalClose" aria-label="Close modal">
                <svg class="icon" aria-hidden="true"><use href="#icon-times"></use></svg>
            </button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="userId">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input class="form-control" type="text" id="uName" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" id="uEmail" required>
            </div>
            <div class="form-group">
                <label class="form-label" id="passwordLabel">Password</label>
                <div class="input-with-toggle">
                    <input class="form-control" type="password" id="uPassword">
                    <button type="button" class="toggle-visibility-btn" data-toggle-password="uPassword"
                        aria-label="Show password" aria-pressed="false">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" data-icon="show">
                            <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" class="d-none" data-icon="hide">
                            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6 0-10-7-10-7a21.76 21.76 0 0 1 5.08-6.12" />
                            <path d="M1 1l22 22" />
                            <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c6 0 10 7 10 7a21.76 21.76 0 0 1-3.17 4.24" />
                            <path d="M14.12 14.12a3 3 0 0 1-4.24-4.24" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Role</label>
                <select class="form-control" id="uRole">
                    <option value="1">Normal User</option>
                    <option value="0">Superadmin</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-control" id="uStatus">
                    <option value="1">Active</option>
                    <option value="0">Inactive</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="btnModalCancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
        </div>
    </form>
</dialog>
{% endblock %}

{% block page_js %}
<script>
    (function () {
        // admin.pk = internal integer id (for self-protection checks)
        const ADMIN_UUID = "{{ admin.uuid }}";
        const ADMIN_ID = "{{ admin.id }}";

        // â”€â”€â”€ Cell Formatters â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

        window.roleFormatter = function (value, row) {
            return value === 0
                ? `<span class="badge badge-indigo">Superadmin</span>`
                : `<span class="badge badge-slate">User</span>`;
        };

        window.statusFormatter = function (value, row) {
            const disabled = row.uuid === ADMIN_UUID ? 'disabled' : '';
            const checked = value === 1 ? 'checked' : '';
            return `<label class="switch">
                    <input type="checkbox" class="status-toggle" data-id="${row.id}" ${checked} ${disabled}>
                    <span class="slider"></span>
                </label>`;
        };

        window.actionsFormatter = function (value, row) {
            const isMe = String(row.id) === String(ADMIN_ID);
            return `<span class="d-inline-flex gap-2">
            <button type="button" class="btn-icon edit-btn" data-id="${row.id}" title="Edit">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button type="button" class="btn-icon btn-icon-danger delete-btn" data-id="${row.id}" data-name="${row.name}" ${isMe ? 'disabled' : ''} title="Delete">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
        </span>`;
        };

        // â”€â”€â”€ Column Event Delegates â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

        window.statusEvents = {
            'change .status-toggle': async function (e, row) {
                const id = e.target.dataset.id;
                const prev = !e.target.checked;
                try {
                    await axios.patch(`/admin/users/${id}/toggle`);
                    Toast.success('Status updated');
                } catch (err) {
                    e.target.checked = prev;
                    Toast.error(err.response?.data?.detail || 'Failed to toggle status');
                }
            }
        };

        window.actionEvents = {
            'click .edit-btn': async function (e, row) {
                openModal(row.id);
            },
            'click .delete-btn': async function (e, row) {
                if (!confirm(`Permanently delete "${row.name}" and all their data?`)) return;
                try {
                    await axios.delete(`/admin/users/${row.id}`);
                    Toast.success('User deleted');
                    getTable('#usersTable').refresh();
                } catch (err) {
                    Toast.error(err.response?.data?.detail || 'Delete failed');
                }
            }
        };

        // â”€â”€â”€ Selection â†’ Delete Selected button â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

        document.getElementById('usersTable').addEventListener('ct:selectionChange', (e) => {
            const ids = e.detail;
            document.getElementById('btnDeleteSelected').disabled = ids.length === 0;
        });

        document.getElementById('btnDeleteSelected').addEventListener('click', async () => {
            const ids = getTable('#usersTable').getSelections();
            if (!ids.length) return;
            if (!confirm(`Permanently delete ${ids.length} users?`)) return;
            try {
                await axios.post('/admin/users/delete-multiple', { ids });
                Toast.success(`${ids.length} users deleted`);
                getTable('#usersTable').refresh();
            } catch (err) {
                Toast.error(err.response?.data?.detail || 'Bulk delete failed');
            }
        });

        // â”€â”€â”€ Modal Logic â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

        const modal = document.getElementById('userModal');
        const form = document.getElementById('userForm');

        function openModal(id = null) {
            form.reset();
            document.getElementById('userId').value = '';
            document.getElementById('passwordLabel').textContent = id ? 'Password (leave blank to keep current)' : 'Password';
            document.getElementById('uPassword').required = !id;
            document.getElementById('modalTitle').textContent = id ? 'Edit User' : 'Create User';
            modal.showModal();

            if (id) {
                // id = uuid string (row.id from data endpoint = uuid)
                axios.get(`/admin/users/${id}/edit`).then(res => {
                    const d = res.data?.data ?? res.data;
                    document.getElementById('userId').value = d.uuid;  // store UUID for PUT
                    document.getElementById('uName').value = d.name;
                    document.getElementById('uEmail').value = d.email;
                    document.getElementById('uRole').value = d.role;
                    document.getElementById('uStatus').value = d.status;
                }).catch(() => Toast.error('Failed to load user data'));
            }
        }

        document.getElementById('btnCreate').addEventListener('click', () => openModal());
        document.getElementById('btnModalCancel')?.addEventListener('click', () => modal.close());
        document.getElementById('btnModalClose')?.addEventListener('click', () => modal.close());
        modal.addEventListener('cancel', (e) => e.preventDefault());

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const payload = {
                name: document.getElementById('uName').value,
                email: document.getElementById('uEmail').value,
                password: document.getElementById('uPassword').value,
                role: document.getElementById('uRole').value,
                status: document.getElementById('uStatus').value,
            };

            try {
                if (id) await axios.put(`/admin/users/${id}`, payload);
                else await axios.post('/admin/users', payload);
                modal.close();
                Toast.success(id ? 'User updated' : 'User created');
                getTable('#usersTable').refresh();
            } catch (err) {
                Toast.error(err.response?.data?.detail || err.message);
            }
        });
    })();
</script>
{% endblock %}
