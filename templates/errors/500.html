{% extends "layouts/guest.html" %}

{% block title %}500 - Internal Server Error{% endblock %}

{% block content %}
<section class="mx-auto flex min-h-[60vh] max-w-3xl items-center justify-center">
    <div class="error-shell w-full px-8 py-12 text-center sm:px-12">
        <p class="text-xs font-black uppercase tracking-[0.24em] text-slate-500">Error 500</p>
        <h1 class="mt-3 text-7xl font-black text-slate-200 sm:text-8xl">500</h1>
        <h2 class="-mt-4 text-3xl sm:text-4xl">Internal Server Error</h2>
        <p class="mx-auto mt-4 max-w-xl text-sm leading-7 text-slate-600 sm:text-base">Something failed on the server
            while preparing this view. You can retry or move back to a stable area of the app.</p>
        <div class="mt-8 flex flex-wrap justify-center gap-3">
            <button onclick="location.reload()" class="btn btn-primary" type="button">
                <i class="fas fa-rotate-right"></i>
                Try Again
            </button>
            <a href="/" class="btn btn-secondary !border-slate-200 !bg-white !text-slate-900 hover:!bg-slate-50">
                <i class="fas fa-home"></i>
                Back Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
