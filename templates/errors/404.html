{% extends "layouts/guest.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<section class="mx-auto flex min-h-[60vh] max-w-3xl items-center justify-center">
    <div class="error-shell w-full px-8 py-12 text-center sm:px-12">
        <p class="text-xs font-black uppercase tracking-[0.24em] text-slate-500">Error 404</p>
        <h1 class="mt-3 text-7xl font-black text-slate-200 sm:text-8xl">404</h1>
        <h2 class="-mt-4 text-3xl sm:text-4xl">Page Not Found</h2>
        <p class="mx-auto mt-4 max-w-xl text-sm leading-7 text-slate-600 sm:text-base">The page you requested does not
            exist or has moved. Use the primary navigation to return to an active route.</p>
        <div class="mt-8 flex flex-wrap justify-center gap-3">
            <a href="/" class="btn btn-primary">
                <svg class="icon" aria-hidden="true"><use href="#icon-home"></use></svg>
                Back Home
            </a>
            <a href="{{ route('dashboard') }}"
                class="btn btn-secondary !border-slate-200 !bg-white !text-slate-900 hover:!bg-slate-50">
                <svg class="icon" aria-hidden="true"><use href="#icon-chart-line"></use></svg>
                Open Workspace
            </a>
        </div>
    </div>
</section>
{% endblock %}
