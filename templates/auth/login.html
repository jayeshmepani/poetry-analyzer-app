{% extends "layouts/guest.html" %}

{% block title %}Login - Poetry Analyzer{% endblock %}

{% block content %}
<div class="container d-flex items-center justify-center p-4 min-h-screen">
    <div class="card w-full max-w-xs shadow-xl scroll-reveal">

        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold mb-2 tracking-tight text-text font-display">Welcome Back</h1>
            <p class="text-sm text-soft">Enter your credentials to access your workspace</p>
        </div>

        {% if error %}
        <div class="alert alert-danger mb-6">
            <svg class="icon text-lg mt-1" aria-hidden="true"><use href="#icon-exclamation-circle"></use></svg>
            <div>{{ error }}</div>
        </div>
        {% endif %}

        <form action="{{ route('login') }}" method="POST" class="d-flex flex-col gap-6">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="you@example.com"
                    autofocus>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-with-toggle">
                    <input type="password" id="password" name="password" class="form-input" required
                        placeholder="••••••••">
                    <button type="button" class="toggle-visibility-btn" data-toggle-password="password"
                        aria-label="Show password" aria-pressed="false">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" data-icon="show">
                            <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="d-none" data-icon="hide">
                            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6 0-10-7-10-7a21.76 21.76 0 0 1 5.08-6.12" />
                            <path d="M1 1l22 22" />
                            <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c6 0 10 7 10 7a21.76 21.76 0 0 1-3.17 4.24" />
                            <path d="M14.12 14.12a3 3 0 0 1-4.24-4.24" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-full mt-2">
                Sign In
            </button>
        </form>

        <div class="text-center mt-8 text-sm text-soft">
            Need an account? <a href="{{ route('register') }}" class="text-primary font-medium hover:underline">Create one now</a>
        </div>

    </div>
</div>
{% endblock %}
