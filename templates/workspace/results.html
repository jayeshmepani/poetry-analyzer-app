{% extends "layouts/app.html" %}

{% block title %}Analysis Results - PoetryMaster{% endblock %}

{% block content %}
<div class="mx-auto max-w-7xl w-full px-4 py-8 sm:px-6 lg:px-8">
    <div class="page-header">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h10l6 6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"></path>
            <path d="M14 4v6h6"></path>
        </svg>
        <h1>Analysis Results</h1>
    </div>

    <div id="resultsToolbar" class="d-flex items-center gap-2">
        <button type="button" class="btn btn-secondary" id="btnRefreshResults">
            <svg class="icon" aria-hidden="true">
                <use href="#icon-sync-alt"></use>
            </svg>
            Refresh
        </button>
        <button type="button" class="btn btn-danger" id="btnDeleteSelectedResults" disabled>
            <svg class="icon" aria-hidden="true">
                <use href="#icon-trash"></use>
            </svg>
            Delete Selected
        </button>
        <button type="button" class="btn btn-danger" id="btnClearAllResults">
            <svg class="icon" aria-hidden="true">
                <use href="#icon-trash"></use>
            </svg>
            Clear All
        </button>
    </div>

    <table data-table data-url="{{ route('data.results.list') }}" data-sort="created_at" data-order="desc"
        data-page-size="10" data-page-list="[5,10,25,50,100,&quot;all&quot;]" data-search="true" data-click-to-select="true"
        data-toolbar="#resultsToolbar" id="resultsTable">
        <thead>
            <tr>
                <th data-field="state" data-checkbox="true"></th>
                <th data-field="title" data-formatter="resultTitleFormatter" data-sortable="true">Title</th>
                <th data-field="language" data-sortable="true" data-formatter="resultLanguageFormatter">Language</th>
                <th data-field="poetic_form" data-sortable="true">Form</th>
                <th data-field="overall_score" data-sortable="true" data-formatter="resultScoreFormatter">Score</th>
                <th data-field="word_count" data-sortable="true" data-formatter="resultStatsFormatter">Stats</th>
                <th data-field="created_at" data-sortable="true" data-formatter="resultDateFormatter">Created</th>
                <th data-field="actions" data-formatter="resultActionsFormatter" data-events="resultActionEvents">Actions</th>
            </tr>
        </thead>
    </table>
</div>
{% endblock %}

{% block page_js %}
<script>
    (function () {
        const RESULTS_TABLE_SELECTOR = '#resultsTable';
        const urlParams = new URLSearchParams(window.location.search);
        const viewId = urlParams.get('view');

        function notifySuccess(message) {
            if (window.Toast?.success) {
                window.Toast.success(message);
                return;
            }
            if (typeof window.showToast === 'function') {
                window.showToast(message, 'success');
            }
        }

        function extractErrorMessage(err, fallback) {
            return (
                err?.response?.data?.error ||
                err?.response?.data?.detail ||
                err?.message ||
                fallback
            );
        }

        function notifyError(message) {
            if (window.Toast?.error) {
                window.Toast.error(message);
                return;
            }
            if (typeof window.showToast === 'function') {
                window.showToast(message, 'error');
            }
        }

        function scoreColor(score) {
            const numeric = Number(score);
            if (!Number.isFinite(numeric)) return 'var(--color-text-muted)';
            if (numeric >= 8) return 'var(--color-success)';
            if (numeric >= 6) return 'var(--color-warning)';
            return 'var(--color-danger)';
        }

        function getLanguageName(code) {
            const languages = {
                en_old: 'Old English (Anglo-Saxon)',
                en_middle: 'Middle English (Chaucerian)',
                en_modern: 'Modern English',
                en_british: 'British English',
                en_american: 'American English',
                en_australian: 'Australian English',
                en_indian: 'Indian English',
                en_south_african: 'South African English',
                en_caribbean: 'Caribbean English(es)',
                en_scots: 'Scots (Lowland Scots)',
                en_aave: 'African American Vernacular English (AAVE)',
                en_cockney: 'Cockney',
                en_southern_us: 'Southern American English',
                en_geordie: 'Geordie',
                hi_braj: 'Braj Bhasha',
                hi_awadhi: 'Awadhi',
                hi_maithili: 'Maithili',
                hi_sadhukkari: 'Sadhukkari',
                hi_khariboli: 'Khari Boli',
                gu_kathiawadi: 'Kathiawadi',
                gu_charotari: 'Charotari',
                gu_surati: 'Surati',
                gu_old: 'Old Gujarati',
                ur_standard: 'Modern Standard Urdu',
                ur_dakhni: 'Dakhni',
                ur_rekhta: 'Rekhta',
                ur_dhakaiya: 'Dhakaiya Urdu',
                en_creole: 'Creole Forms',
                hinglish: 'Hinglish',
                en: 'Modern English',
                hi: 'Hindi (Modern Standard)',
                gu: 'Gujarati (Standard)',
                ur: 'Modern Standard Urdu',
                ur_deva: 'Modern Standard Urdu',
                brj_deva: 'Braj Bhasha',
                mr: 'Khari Boli',
                bn: 'Khari Boli',
                sa: 'Khari Boli'
            };
            return languages[code] || code || '-';
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        window.resultTitleFormatter = function (value, row) {
            const safeTitle = value || 'Untitled';
            const preview = row.text_preview || '';
            return `
                <div class="font-extrabold text-text mb-1">${safeTitle}</div>
                <div class="text-xs text-soft truncate max-w-250">${preview}</div>
            `;
        };

        window.resultLanguageFormatter = function (value) {
            return `<span class="badge badge-primary">${getLanguageName(value)}</span>`;
        };

        window.resultScoreFormatter = function (value) {
            const numeric = Number(value);
            const color = scoreColor(numeric);
            const display = Number.isFinite(numeric) ? numeric.toFixed(1) : '-';
            const width = Number.isFinite(numeric) ? Math.max(0, Math.min(numeric, 10)) * 10 : 0;
            return `
                <div class="d-flex items-center gap-2">
                    <div class="rounded-full bg-subtle overflow-hidden w-16 h-2">
                        <div class="h-full rounded-full" style="width:${width}%;background:${color};"></div>
                    </div>
                    <span class="font-black" style="color:${color};">${display}</span>
                </div>
            `;
        };

        window.resultStatsFormatter = function (value, row) {
            const words = Number.isFinite(Number(row.word_count)) ? Number(row.word_count) : 0;
            const lines = Number.isFinite(Number(row.line_count)) ? Number(row.line_count) : 0;
            return `<span><strong class="text-text">${words}</strong> w / <strong class="text-text">${lines}</strong> L</span>`;
        };

        window.resultDateFormatter = function (value) {
            return formatDate(value);
        };

        window.resultActionsFormatter = function (value, row) {
            return `
                <span class="d-inline-flex gap-2">
                    <button type="button" class="btn-icon view-btn" data-id="${row.id}" title="View">
                        <svg class="icon" aria-hidden="true"><use href="#icon-eye"></use></svg>
                    </button>
                    <button type="button" class="btn-icon btn-icon-danger delete-btn" data-id="${row.id}" title="Delete">
                        <svg class="icon" aria-hidden="true"><use href="#icon-trash"></use></svg>
                    </button>
                </span>
            `;
        };

        async function deleteOne(resultId) {
            await axios.delete(`{{ route('data.result.delete', result_id='') }}${resultId}`);
        }

        async function deleteMany(ids) {
            await axios.post('{{ route('data.results.destroy_multiple') }}', { ids });
        }

        async function clearAll() {
            await axios.post('{{ route('data.results.clear') }}');
        }

        window.resultActionEvents = {
            'click .view-btn': function (e, row) {
                window.location.href = `{{ route('results.detail', result_id='') }}${row.id}`;
            },
            'click .delete-btn': async function (e, row) {
                if (!confirm('Delete this analysis permanently?')) return;
                try {
                    await deleteOne(row.id);
                    notifySuccess('Analysis deleted');
                    getTable(RESULTS_TABLE_SELECTOR).refreshCurrent();
                } catch (err) {
                    notifyError(extractErrorMessage(err, 'Delete failed'));
                }
            }
        };

        const tableElement = document.getElementById('resultsTable');
        tableElement.addEventListener('ct:selectionChange', (e) => {
            const selected = e.detail || [];
            document.getElementById('btnDeleteSelectedResults').disabled = selected.length === 0;
        });

        document.getElementById('btnRefreshResults').addEventListener('click', () => {
            getTable(RESULTS_TABLE_SELECTOR).refreshCurrent();
        });

        document.getElementById('btnDeleteSelectedResults').addEventListener('click', async () => {
            const ids = getTable(RESULTS_TABLE_SELECTOR).getSelections();
            if (!ids.length) return;
            if (!confirm(`Delete ${ids.length} selected analyses permanently?`)) return;
            try {
                await deleteMany(ids);
                notifySuccess(`${ids.length} analyses deleted`);
                getTable(RESULTS_TABLE_SELECTOR).refresh();
            } catch (err) {
                notifyError(extractErrorMessage(err, 'Bulk delete failed'));
            }
        });

        document.getElementById('btnClearAllResults').addEventListener('click', async () => {
            if (!confirm('This will permanently delete your full analysis history. Continue?')) return;
            try {
                await clearAll();
                notifySuccess('All analyses cleared');
                getTable(RESULTS_TABLE_SELECTOR).refresh();
            } catch (err) {
                notifyError(extractErrorMessage(err, 'Clear all failed'));
            }
        });

        if (viewId) {
            window.location.href = `{{ route('results.detail', result_id='') }}${viewId}`;
        }
    })();
</script>
{% endblock %}
