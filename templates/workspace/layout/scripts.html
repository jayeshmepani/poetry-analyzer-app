<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

<script>
    window.AppRoutes = {{ app_routes|tojson }};

    function showToast(msg, type='info') { toastr[type](msg); }
    function showLoading(msg='Processing...') { return toastr.info(msg, '', { timeOut: 0, extendedTimeOut: 0 }); }
    function hideLoading() { toastr.clear(); }

    function getScoreColor(score) {
        if (score >= 8) return 'text-emerald-600';
        if (score >= 6) return 'text-amber-600';
        if (score >= 4) return 'text-orange-500';
        return 'text-rose-600';
    }

    function getScoreBg(score) {
        if (score >= 8) return 'bg-emerald-100 text-emerald-700';
        if (score >= 6) return 'bg-amber-100 text-amber-700';
        if (score >= 4) return 'bg-orange-100 text-orange-700';
        return 'bg-rose-100 text-rose-700';
    }

    function formatDate(d) {
        return new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
</script>

<script src="{{ url_for('static', path='/js/main.js') }}"></script>
<script src="{{ url_for('static', path='/js/results_functions.js') }}"></script>
